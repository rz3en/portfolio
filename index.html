<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mohammad Razin Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
  </header>

  <section class="gallery">
    <img src="images/page-01.jpg" alt="">
    <img src="images/page-02.jpg" alt="">
    <img src="images/page-03.jpg" alt="">
    <img src="images/page-04.jpg" alt="">
    <img src="images/page-05.jpg" alt="">
    <img src="images/page-06.jpg" alt="">
    <img src="images/page-07.jpg" alt="">
    <img src="images/page-08.jpg" alt="">
    <img src="images/page-09.jpg" alt="">
    <img src="images/page-10.jpg" alt="">
    <img src="images/page-11.jpg" alt="">
    <img src="images/page-12.jpg" alt="">
    <img src="images/page-13.jpg" alt="">
    <img src="images/page-14.jpg" alt="">
    <img src="images/page-15.jpg" alt="">
    <img src="images/page-16.jpg" alt="">
  </section>
  <div class="lightbox" id="lightbox">
  <img src="" id="lightbox-img">
</div>

<script>
  const images = document.querySelectorAll(".gallery img");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  images.forEach(img => {
    img.addEventListener("click", () => {
      lightbox.style.display = "flex";
      lightboxImg.src = img.src;
    });
  });

  lightbox.addEventListener("click", () => {
    lightbox.style.display = "none";
  });
</script>

</body>
</html>
